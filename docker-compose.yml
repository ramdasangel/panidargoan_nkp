services:
  db:
    build: ./db
    image: panidargoan-db:local
    container_name: panidargoan-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-panidargoan}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-panidargoan}
      POSTGRES_DB: ${POSTGRES_DB:-panidargoan}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-panidargoan}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: panidargoan-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-panidargoan}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-panidargoan-minio-changeme}
    ports:
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: panidargoan-redis
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  api:
    build: ./api
    container_name: panidargoan-api
    profiles: ["app"]
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-panidargoan}:${POSTGRES_PASSWORD:-panidargoan}@db:5432/${POSTGRES_DB:-panidargoan}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-dev-secret-change-me-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      CORS_ORIGIN: ${CORS_ORIGIN:-http://localhost:8080}
      AUTH_MODE: ${AUTH_MODE:-dummy}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      ADMIN_EMAILS: ${ADMIN_EMAILS:-}
      MINIO_ENDPOINT: http://minio:9000
      MINIO_REGION: us-east-1
      MINIO_BUCKET: ${MINIO_BUCKET:-panidargoan}
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-panidargoan}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-panidargoan-minio-changeme}
      API_PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: ./web
      args:
        VITE_API_URL: ""
        VITE_AUTH_MODE: ${AUTH_MODE:-dummy}
        VITE_GOOGLE_MAPS_API_KEY: ${VITE_GOOGLE_MAPS_API_KEY:-}
        VITE_PROJECT_WATERSHED_ROOT: ${VITE_PROJECT_WATERSHED_ROOT:-WS-UPPER-BHIMA}
    container_name: panidargoan-web
    profiles: ["app"]
    ports:
      # Direct HTTP access — useful for local testing and as a fallback.
      # Production traffic comes through caddy on 80/443 instead.
      - "8080:80"
    depends_on:
      - api
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    container_name: panidargoan-caddy
    # Only run in deployments that need HTTPS — typically on the cloud server.
    # Use:  docker compose --profile app --profile https up -d
    profiles: ["https"]
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  minio_data:
  caddy_data:
  caddy_config:
